<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuck Norris Jokes - Vue.js + Bootstrap</title>

    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Custom styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Vue 2 -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
</head>
<body>

    <div id="app">
        <div class="container py-5">

            <!-- Header -->
            <header class="text-center mb-5">
                <h1 class="display-4 fw-bold text-white title-shadow">💪 Chuck Norris Facts</h1>
            </header>

            <!-- Cards grid: 3 per row on md+, 1 per row on small screens -->
            <div class="row row-cols-1 row-cols-md-3 g-4">
                <div class="col" v-for="(joke, index) in chuck" :key="index">
                    <chuck-card
                        :icon_url="joke.icon_url"
                        :value="joke.value"
                        :number="index + 1">
                    </chuck-card>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap 5 JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="app.js"></script>
</body>
</html>
